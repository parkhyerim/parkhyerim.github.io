<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resume | Hyerim Park</title>

  <script>
    (function () {
      try {
        const saved = localStorage.getItem("theme");
        if (saved === "dark" || saved === "light") {
          document.documentElement.setAttribute("data-theme", saved);
        }
      } catch (e) { }
    })();
  </script>

  <link rel="icon" href="assets/home.png" type="image/png" />
  <link rel="stylesheet" href="homepage.css" />
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html#top">
        <img class="brand-mark" src="assets/home.png" alt="" />
      </a>

      <nav class="nav">
        <a href="index.html#about">About</a>
        <a href="work.html">Work</a>
        <a href="publications.html">Research</a>
        <a href="cv.html" aria-current="page">Resume</a>
      </nav>

      <button id="themeToggle" class="icon-btn">
        🌓
      </button>
    </div>
  </header>

  <main id="main">
    <section class="section cv-minimal">
      <div class="container cv-minimal-container">

        <p class="eyebrow-home">Resume</p>
        <h1 class="cv-title">Download</h1>

        <div class="cv-buttons">
          <a class="chip chip-primary" href="assets/cv/Hyerim_Park_Industry_CV.pdf" target="_blank" rel="noopener">
            Resume (UX / Industry)
          </a>

          <!-- <a class="chip chip-blue" href="assets/pdf/Hyerim_Park_Academic_CV.pdf" download>
            CV (Academic)
          </a> -->
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="muted small">© <span id="year"></span> Hyerim Park</div>
    </div>
  </footer>

  <script>
    (function () {
      const root = document.documentElement;
      const toggle = document.getElementById("themeToggle");

      if (toggle) {
        toggle.addEventListener("click", function () {
          const current =
            root.getAttribute("data-theme") === "dark" ? "dark" : "light";
          const next = current === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", next);
          try { localStorage.setItem("theme", next); } catch (e) { }
        });
      }

      const year = document.getElementById("year");
      if (year) year.textContent = new Date().getFullYear();
    })();
  </script>
</body>

</html>
